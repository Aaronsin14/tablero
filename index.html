<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero Tier 2 — AngioDynamics</title>
<style>
  :root{
    --navy:#0f2542; --navy2:#13325c; --ink:#0b1b30;
    --green:#1f9d55; --green-soft:#e7f6ee;
    --amber:#e0a008; --amber-soft:#fdf3da;
    --red:#dc3545; --red-soft:#fbe7e9;
    --grey:#6b7a8d; --line:#e4e8ee; --bg:#eef1f5; --card:#ffffff;
    --txt:#1d2b3a;
    --mono:'Roboto Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:var(--sans);color:var(--txt);font-size:14px}
  .wrap{max-width:1880px;margin:0 auto;padding:0 0 30px}

  /* ---- header ---- */
  header.top{background:var(--navy);color:#fff;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
  header.top h1{margin:0;font-size:22px;font-weight:800;letter-spacing:.4px}
  header.top .sub{font-size:11px;letter-spacing:2px;color:#9fb4cf;margin-top:3px;font-weight:600}
  .pills{display:flex;gap:10px}
  .pill{background:var(--navy2);border-radius:10px;padding:7px 16px;text-align:center;min-width:96px}
  .pill .k{font-size:9px;letter-spacing:1.5px;color:#8aa3c4;font-weight:700}
  .pill .v{font-size:14px;font-weight:800;margin-top:2px}

  /* ---- toolbar ---- */
  .toolbar{background:var(--card);border-bottom:1px solid var(--line);padding:12px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .toolbar label{font-size:10px;letter-spacing:1.5px;font-weight:700;color:var(--grey)}
  select{font-family:var(--sans);font-size:13px;font-weight:600;padding:7px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--txt);cursor:pointer}
  .src{margin-left:auto;font-size:12px;color:var(--grey)}
  .src b{color:var(--navy)}
  .stamp{font-size:11px;color:var(--grey)}

  /* ---- KPI cards row ---- */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:18px 22px}
  .kcard{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(15,37,66,.06)}
  .kcard .hd{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;color:#fff;font-weight:800;letter-spacing:.5px}
  .kcard .hd.g{background:var(--green)} .kcard .hd.a{background:var(--amber)} .kcard .hd.r{background:var(--red)} .kcard .hd.n{background:var(--grey)}
  .badge{font-size:10px;letter-spacing:1px;font-weight:800;background:rgba(255,255,255,.22);padding:3px 9px;border-radius:20px}
  .krow{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--line)}
  .krow:first-of-type{border-top:none}
  .krow .lbl{font-size:13px;font-weight:600}
  .krow .lbl small{display:block;color:var(--grey);font-weight:500;font-size:11px;margin-top:1px}
  .krow .val{font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px;white-space:nowrap}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  .dot.g{background:var(--green)} .dot.a{background:var(--amber)} .dot.r{background:var(--red)} .dot.n{background:var(--grey)}
  .dash{color:var(--grey);font-weight:800;font-size:18px}

  /* ---- attention banner ---- */
  .banner{margin:4px 22px 0;border-radius:12px;display:flex;align-items:center;gap:20px;padding:18px 22px;color:#3a2c00}
  .banner.ok{background:var(--green);color:#fff} .banner.warn{background:var(--amber)} .banner.bad{background:var(--red);color:#fff}
  .banner .face{font-size:34px;line-height:1}
  .banner .msg h2{margin:0;font-size:20px;font-weight:900;letter-spacing:.5px}
  .banner .msg p{margin:3px 0 0;font-size:13px;font-weight:600;opacity:.92}
  .banner .gauge{margin-left:auto;min-width:330px}
  .gauge .gtop{display:flex;justify-content:space-between;align-items:baseline;font-weight:800}
  .gauge .gtop .glab{font-size:11px;letter-spacing:1.5px} .gauge .gtop .gpct{font-size:26px}
  .gbar{height:14px;border-radius:10px;background:rgba(0,0,0,.18);margin-top:7px;overflow:hidden}
  .gfill{height:100%;background:#fff;border-radius:10px;transition:width .6s ease}
  .gsub{font-size:11px;font-weight:600;margin-top:5px;opacity:.9}

  /* ---- lower grid ---- */
  .lower{display:grid;grid-template-columns:1fr;gap:14px;padding:18px 22px}
  .panel{background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(15,37,66,.06)}
  .panel .phd{background:var(--navy);color:#fff;padding:11px 16px;display:flex;justify-content:space-between;align-items:center;font-weight:800;letter-spacing:.5px;font-size:14px}
  .panel .phd .tag{font-size:11px;background:var(--navy2);padding:4px 11px;border-radius:7px;color:#bcd0ec}
  .panel .pbody{padding:16px}
  .hint{font-size:12px;color:var(--grey);margin:0 0 14px}

  /* bars chart */
  /* ---- grafico ordenado v2 ---- */
  .chart2{position:relative;padding-top:24px;height:230px}
  .chart2.empty{display:flex;align-items:center;justify-content:center;height:100%}
  .chart2.empty .emptybox{text-align:center;color:var(--grey)}
  .chart2.empty .emoji{font-size:44px;margin-bottom:10px}
  .chart2.empty .etit{font-size:18px;font-weight:800;color:var(--txt)}
  .chart2.empty .esub{font-size:13px;margin-top:6px}
  .chart2 .bars{display:flex;align-items:flex-end;gap:16px;height:100%}
  .chart2 .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
  /* plot: contenedor; barra y linea de meta miden en % desde la MISMA base (abajo) */
  .chart2 .plot{width:100%;position:relative;display:flex;justify-content:center;align-items:flex-end;height:100%;min-height:0}
  .chart2 .bar{position:relative;width:100%;max-width:70px;border-radius:7px 7px 0 0;transition:height .5s ease;min-height:3px;display:flex;justify-content:center}
  .chart2 .bar.g{background:var(--green)} .chart2 .bar.a{background:var(--amber)} .chart2 .bar.r{background:var(--red)} .chart2 .bar.z{background:#dfe4ea}
  .chart2 .bv{position:absolute;left:50%;transform:translateX(-50%);font-weight:800;font-size:13px;line-height:1;white-space:nowrap}
  .chart2 .bv.in{top:11px;color:#fff}
  .chart2 .bv.out{top:-22px;color:var(--txt)}
  /* linea de meta: posicionada por 'bottom', misma base que la barra */
  .chart2 .mline{position:absolute;left:50%;transform:translateX(-50%);width:100%;max-width:72px;border-top:2px dashed #24406b;z-index:4}
  .chart2 .mline .mlab{position:absolute;right:100%;top:-8px;margin-right:8px;font-size:11px;font-weight:800;color:#24406b;white-space:nowrap}
  .chart2 .mark{font-size:15px;font-weight:800;margin-top:6px;height:18px}
  .chart2 .mark.g{color:var(--green)} .chart2 .mark.a{color:var(--amber)} .chart2 .mark.r{color:var(--red)} .chart2 .mark.z{color:transparent}
  .chart2 .day{font-size:12px;color:var(--grey);font-weight:700;margin-top:4px}
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:16px;font-size:12px;color:var(--txt)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .lg{width:11px;height:11px;border-radius:3px;display:inline-block}

  /* detail table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{text-align:left;font-size:10px;letter-spacing:1px;color:var(--grey);font-weight:700;padding:6px 8px;border-bottom:1px solid var(--line)}
  thead th.r{text-align:right}
  .kpiname td{padding:11px 8px 3px;font-weight:800;font-size:13px}
  .kpiname td small{display:block;color:var(--grey);font-weight:600;font-size:10px;letter-spacing:.5px;text-transform:uppercase}
  tbody tr.trk td{padding:3px 8px;border-bottom:1px solid #f1f4f8}
  .trk .t{font-size:11px;letter-spacing:.5px;color:var(--grey);font-weight:700;text-transform:uppercase;width:90px}
  .trk .num{font-family:var(--mono);text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
  .meter{width:46%}
  .mtrack{height:9px;border-radius:6px;background:#eef1f5;overflow:hidden}
  .mfill{height:100%;border-radius:6px}
  .mfill.g{background:var(--green)} .mfill.r{background:var(--red)} .mfill.a{background:var(--amber)}
  .diffpos{color:var(--green)} .diffneg{color:var(--red)}

  footer.foot{background:var(--navy);color:#fff;text-align:center;padding:16px;margin:14px 22px 0;border-radius:12px}
  footer.foot h3{margin:0;font-size:16px;font-weight:900;letter-spacing:1px}
  footer.foot p{margin:5px 0 0;font-size:12px;color:#9fb4cf;font-weight:600}

  .loading{padding:60px;text-align:center;color:var(--grey);font-weight:600}

  /* ============ SCOREBOARD DE NUMEROS GRANDES ============ */
  .scoreboard{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;padding:0 22px 18px}
  .sc{background:var(--card);border-radius:14px;padding:16px 14px;box-shadow:0 1px 3px rgba(15,37,66,.06);position:relative;overflow:hidden;border-top:5px solid var(--grey);text-align:center}
  .sc.g{border-top-color:var(--green)} .sc.a{border-top-color:var(--amber)} .sc.r{border-top-color:var(--red)} .sc.i{border-top-color:#2b6cb0} .sc.n{border-top-color:var(--grey)}
  .sc-lbl{font-size:11px;letter-spacing:1px;font-weight:800;color:var(--grey);text-transform:uppercase;line-height:1.2;min-height:26px;display:flex;align-items:center;justify-content:center}
  .sc-big{font-size:40px;font-weight:900;line-height:1;margin:8px 0 6px;letter-spacing:-1px;font-variant-numeric:tabular-nums}
  .sc.g .sc-big{color:var(--green)} .sc.a .sc-big{color:var(--amber)} .sc.r .sc-big{color:var(--red)} .sc.i .sc-big{color:#2b6cb0} .sc.n .sc-big{color:var(--ink)}
  .sc-sub{font-size:11px;color:var(--grey);font-weight:600}

  /* ============ MODO TV: 1920x1080 SIN SCROLL ============ */
  body.tv{overflow:hidden;height:100vh}
  html:has(body.tv){overflow:hidden}
  body.tv .wrap{max-width:1920px;height:100vh;height:100dvh;display:flex;flex-direction:column;padding:0;overflow:hidden;transform-origin:top center}
  body.tv header.top{padding:8px 20px;flex:0 0 auto}
  body.tv header.top h1{font-size:19px}
  body.tv header.top .sub{font-size:10px;margin-top:1px}
  body.tv .pill{padding:4px 12px;min-width:82px}
  body.tv .pill .v{font-size:12px}
  body.tv .toolbar{padding:6px 20px;flex:0 0 auto;gap:10px}
  body.tv .toolbar select{padding:4px 8px;font-size:12px}
  body.tv .kpis{padding:12px 22px;gap:14px;flex:0 0 auto}
  body.tv .kcard .hd{padding:10px 16px;font-size:15px}
  body.tv .badge{font-size:10px;padding:3px 9px}
  body.tv .krow{padding:11px 16px}
  body.tv .krow .lbl{font-size:14px}
  body.tv .krow .lbl small{font-size:11px}
  body.tv .krow .val{font-size:19px}
  body.tv .banner{margin:0 22px;padding:14px 22px;flex:0 0 auto}
  body.tv .banner .face{font-size:34px}
  body.tv .banner .msg h2{font-size:21px}
  body.tv .banner .msg p{font-size:13px}
  body.tv .banner .gauge{min-width:320px}
  body.tv .gauge .gtop .gpct{font-size:26px}
  body.tv .gbar{height:14px}
  body.tv .lower{padding:8px 20px;flex:1 1 auto;min-height:0;grid-template-columns:1fr}
  body.tv .lower .panel{display:flex;flex-direction:column;min-height:0;flex:1 1 auto}
  body.tv .lower .panel .phd{padding:7px 14px;font-size:13px;flex:0 0 auto}
  body.tv .lower .panel .pbody{padding:10px 14px;overflow:hidden;flex:1 1 auto;min-height:0;display:flex;flex-direction:column}
  body.tv .hint{font-size:11px;margin:0 0 8px;flex:0 0 auto}
  body.tv .chart2{flex:1 1 auto;display:flex;flex-direction:column;justify-content:flex-end;min-height:0;height:auto;padding-top:34px}
  body.tv .chart2 .bars{flex:1 1 auto;min-height:0;align-items:flex-end}
  body.tv .chart2 .col{height:100%;justify-content:flex-end}
  body.tv .chart2 .plot{height:100%!important;min-height:0}
  body.tv .legend{margin-top:8px;font-size:11px;gap:12px}
  body.tv table{font-size:12px}
  body.tv .kpiname td{padding:6px 6px 2px;font-size:12px}
  body.tv tbody tr.trk td{padding:2px 6px}
  body.tv .scoreboard{padding:8px 20px 10px;flex:0 0 auto;gap:12px}
  body.tv .sc{padding:12px 12px}
  body.tv .sc-lbl{font-size:10px;min-height:22px}
  body.tv .sc-big{font-size:38px;margin:6px 0 4px}
  body.tv .sc-sub{font-size:10px}
  body.tv footer.foot{margin:0;border-radius:0;padding:6px;flex:0 0 auto}
  body.tv footer.foot h3{font-size:13px}
  body.tv footer.foot p{font-size:10px;margin-top:2px}
  @media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}.lower{grid-template-columns:1fr}.banner .gauge{min-width:200px}}
  @media(max-width:640px){.kpis{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Cargando datos del tablero…</div>
</div>

<script>
const PLANT = "AngioDynamics";
const KPI_TYPE_FMT = {pct:1, units:0, count:0, hours:2};

function fmt(v, type){
  if(v===null||v===undefined) return "—";
  if(type==="pct") return (v*100).toFixed(1)+"%";
  if(type==="hours") return v.toFixed(3);
  return Math.round(v).toLocaleString("en-US");
}
function sum(arr){ return arr.reduce((a,b)=>a+(b||0),0); }
function dateRangeLabel(wk){
  const ds=wk.dates.filter(Boolean);
  if(!ds.length) return "";
  const f=ds[0], l=ds[ds.length-1];
  const short=s=>s? s.slice(5):""; // MM-DD
  return ` · ${short(f)}→${short(l)}`;
}
function firstFilledIndex(actualArr){
  for(let i=0;i<actualArr.length;i++){ if(actualArr[i]!==null && actualArr[i]!==undefined) return i; }
  return -1;
}
// status segun ratio real/plan (mayor es mejor) o inverso para scrap/downtime
function ratioStatus(real, plan){
  if(plan===null||plan===0||plan===undefined) return "n";
  const r=real/plan;
  if(r>=0.995) return "g"; if(r>=0.50) return "a"; return "r";
}

async function loadData(){
  try{
    const res = await fetch("data.json?_="+Date.now(), {cache:"no-store"});
    if(!res.ok) throw new Error("no data.json");
    return await res.json();
  }catch(e){
    // datos de ejemplo embebidos (para abrir el HTML sin servidor)
    return SAMPLE;
  }
}

let DATA=null, CUR_WEEK=null, CUR_DAY=0;

function render(){
  const wk = DATA.weeks[CUR_WEEK];
  const K = wk.kpis;
  const di = CUR_DAY;
  const isWeek = (di === -1); // vista SEMANA (totales) vs vista dia

  // helpers para tomar valor del dia o el total/promedio de la semana
  const sumA = arr => arr.reduce((a,b)=>a+(b||0),0);
  const avgA = arr => { const v=arr.filter(x=>x!==null&&x!==undefined); return v.length?v.reduce((a,b)=>a+b,0)/v.length:null; };
  const pick = (kpi, mode) => {
    if(!isWeek) return kpi.actual[di];
    // modo semana: suma para cantidades, promedio para porcentajes
    return mode==="pct" ? avgA(kpi.actual) : sumA(kpi.actual);
  };
  const pickP = (kpi, mode) => {
    if(!isWeek) return kpi.planned[di];
    return mode==="pct" ? avgA(kpi.planned) : sumA(kpi.planned);
  };

  // valores segun vista (dia o semana)
  const safety  = pick(K.safety,"count");
  const quality = pick(K.quality,"count");
  const scrap   = pick(K.scrap,"pct");
  const yieldA  = pick(K.yield,"pct");
  const yieldP  = pickP(K.yield,"pct");
  const outsA   = pick(K.daily_outs,"units");
  const outsP   = pickP(K.daily_outs,"units");
  const downtime= pick(K.downtime,"hours");

  // cumplimiento entrega
  const cump = (outsP && outsP>0 && outsA!==null) ? outsA/outsP : null;

  // status por seccion
  const segSafety  = (safety||0)===0 ? "g":"r";
  const segQuality = (quality||0)===0 ? (yieldA!==null && yieldA<0.97?"a":"g") : "a";
  const yStatus    = yieldA===null?"n": yieldA>=0.97?"g": yieldA>=0.90?"a":"r";
  const segEntrega = cump===null?"n": cump>=0.995?"g": cump>=0.50?"a":"r";
  const segCosto   = (scrap===null && downtime===null)?"n":"g";

  const badge = s => s==="g"?"BIEN":s==="a"?"ATENCIÓN":s==="r"?"REVISAR":"—";

  const dateStr = isWeek ? "Semana completa" : (wk.dates[di] || ("Día "+(di+1)));

  // ---- attention banner ----
  const focuses=[];
  if(segEntrega==="a"||segEntrega==="r") focuses.push("Entrega");
  if(segCosto==="a"||segCosto==="r") focuses.push("Costo");
  if(yStatus==="a"||yStatus==="r") focuses.push("Calidad");
  if(segSafety==="r") focuses.push("Seguridad");
  let bannerCls, bannerTitle, face;
  if(focuses.length===0){ bannerCls="ok"; bannerTitle="VAMOS BIEN"; face="😀"; }
  else if(focuses.includes("Seguridad")||segEntrega==="r"){ bannerCls="bad"; bannerTitle="PONER ATENCIÓN"; face="😟"; }
  else { bannerCls="warn"; bannerTitle="PONER ATENCIÓN"; face="😐"; }
  const gPct = cump!==null? Math.round(cump*100):0;

  const app = document.getElementById("app");
  app.innerHTML = `
  <header class="top">
    <div>
      <h1>TABLERO TIER 2 — ${DATA.plant.toUpperCase()}</h1>
      <div class="sub">SEGURIDAD · CALIDAD · ENTREGA · COSTO — TODOS LOS DÍAS</div>
    </div>
    <div class="pills">
      <div class="pill"><div class="k">PLANTA</div><div class="v">${DATA.plant}</div></div>
      <div class="pill"><div class="k">PERIODO</div><div class="v">${wk.label}</div></div>
      <div class="pill"><div class="k">VISTA</div><div class="v">Diaria</div></div>
    </div>
  </header>

  <div class="toolbar">
    <label>SEMANA</label>
    <select id="selWeek">${DATA.week_order.map((w,idx)=>`<option value="${w}" ${w===CUR_WEEK?"selected":""}>${DATA.weeks[w].label}${dateRangeLabel(DATA.weeks[w])}</option>`).join("")}</select>
    <label>DÍA</label>
    <select id="selDay"><option value="-1" ${isWeek?"selected":""}>★ SEMANA COMPLETA</option>${wk.dates.map((d,i)=>`<option value="${i}" ${i===di?"selected":""}>Día ${i+1}${d?" · "+d:""}</option>`).join("")}</select>
    <div class="src">Fuente: <b>${DATA.source_file}</b> · ${DATA.week_count||DATA.week_order.length} semanas</div>
    <div class="stamp">Actualizado: ${new Date(DATA.generated_at).toLocaleString("es-MX")}</div>
  </div>

  <div class="kpis">
    ${kcard("SEGURIDAD", segSafety, [
      row("Eventos de seguridad","del día", fmt(safety,"count"), segSafety),
    ])}
    ${kcard("CALIDAD", yStatus, [
      row("Eventos MRB","del día", fmt(quality,"count"), (quality||0)===0?"g":"a"),
      row("Yield (rendimiento)","meta ≥ 97%", fmt(yieldA,"pct"), yStatus),
      row("Scrap (desperdicio)","meta ≤ 2%", fmt(scrap,"pct"), scrap===null?"n":scrap<=0.02?"g":"a"),
    ])}
    ${kcard("ENTREGA", segEntrega, [
      row("Salidas FG (real)","lo que terminamos", fmt(outsA,"units"), segEntrega),
      row("Plan de salidas","lo que se planeó", fmt(outsP,"units"), "n"),
      row("Cumplimiento","real ÷ plan", cump===null?"—":Math.round(cump*100)+"%", segEntrega),
    ])}
    ${kcard("COSTO", segCosto, [
      row("Paro no planeado","horas cuello botella", fmt(downtime,"hours"), downtime===null?"n":downtime<=0.1?"g":"a"),
      row("Scrap","costo de desperdicio", fmt(scrap,"pct"), scrap===null?"n":scrap<=0.02?"g":"a"),
    ])}
  </div>

  <div class="banner ${bannerCls}">
    <div class="face">${face}</div>
    <div class="msg">
      <h2>${bannerTitle}</h2>
      <p>${focuses.length?("Hay que mejorar: "+focuses.join(", ")+"."):"Todos los indicadores en meta."} &nbsp; VIENDO: ${wk.label} · ${isWeek?"Semana completa":("Día "+(di+1)+" ("+dateStr+")")}</p>
    </div>
    <div class="gauge">
      <div class="gtop"><span class="glab">PRODUCCIÓN VS META</span><span class="gpct">${gPct}%</span></div>
      <div class="gbar"><div class="gfill" style="width:${Math.min(gPct,100)}%"></div></div>
      <div class="gsub">${outsA!==null?Math.round(outsA).toLocaleString():"0"} de ${outsP?Math.round(outsP).toLocaleString():"0"} unidades${gPct>100?" · meta superada":""}</div>
    </div>
  </div>

  <div class="lower">
    <div class="panel">
      <div class="phd">PRODUCCIÓN POR DÍA — ¿LLEGAMOS A LA META?</div>
      <div class="pbody">

// guarda la semana y dia actuales en la URL (sin recargar) para que se recuerden
function saveState(){
  const p = new URLSearchParams(location.search);
  p.set("w", CUR_WEEK);
  p.set("d", CUR_DAY);
  history.replaceState(null, "", location.pathname + "?" + p.toString());
}

function kcard(title, status, rowsHtml){
  return `<div class="kcard">
    <div class="hd ${status}">${title}<span class="badge">${status==="g"?"BIEN":status==="a"?"ATENCIÓN":status==="r"?"REVISAR":"—"}</span></div>
    ${rowsHtml.join("")}
  </div>`;
}
function row(lbl, sub, val, dot){
  return `<div class="krow"><div class="lbl">${lbl}<small>${sub}</small></div><div class="val">${val}<span class="dot ${dot}"></span></div></div>`;
}

function buildScoreboard(K, wk, di, isWeek){
  // helpers: total de semana o valor del dia
  const sumArr = arr => arr.reduce((a,b)=>a+(b||0),0);
  const avgArr = arr => { const v=arr.filter(x=>x!==null&&x!==undefined); return v.length?v.reduce((a,b)=>a+b,0)/v.length:null; };
  const val = (kpi, mode) => {
    if(isWeek) return mode==="pct" ? (kpi.actual_total ?? avgArr(kpi.actual)) : (kpi.actual_total ?? sumArr(kpi.actual));
    return kpi.actual[di];
  };
  const valP = (kpi, mode) => {
    if(isWeek) return mode==="pct" ? (kpi.planned_total ?? avgArr(kpi.planned)) : (kpi.planned_total ?? sumArr(kpi.planned));
    return kpi.planned[di];
  };

  const outsReal = val(K.daily_outs,"units");
  const outsPlan = valP(K.daily_outs,"units");
  const insReal  = val(K.daily_ins,"units");
  const cumpl    = (outsPlan && outsPlan>0) ? outsReal/outsPlan : null;
  const yieldW   = val(K.yield,"pct");
  const scrapW   = val(K.scrap,"pct");
  const safetyW  = (val(K.safety,"count")) || 0;
  const qualityW = (val(K.quality,"count")) || 0;

  const nfmt = v => v===null||v===undefined ? "—" : Math.round(v).toLocaleString("en-US");
  const pfmt = v => v===null||v===undefined ? "—" : (v*100).toFixed(1)+"%";

  // estado de color (misma regla: verde>=100, ambar>=50, rojo<50)
  const cumpCls = cumpl===null?"n": cumpl>=0.995?"g": cumpl>=0.50?"a":"r";
  const yCls    = yieldW===null?"n": yieldW>=0.97?"g": yieldW>=0.90?"a":"r";

  // etiquetas cambian segun vista
  const alcance = isWeek ? "ESTA SEMANA" : "DEL DÍA";
  const yieldLbl = isWeek ? "YIELD SEMANA" : "YIELD DÍA";

  const cards = [
    {big:nfmt(outsReal), lbl:"PRODUCIDO "+alcance, sub:`meta ${nfmt(outsPlan)} u`, cls:cumpCls, unit:"unidades FG"},
    {big:cumpl===null?"—":Math.round(cumpl*100)+"%", lbl:"CUMPLIMIENTO", sub:"real ÷ plan", cls:cumpCls, unit:""},
    {big:pfmt(yieldW), lbl:yieldLbl, sub:"meta ≥ 97%", cls:yCls, unit:""},
    {big:nfmt(insReal), lbl:"ENTRADAS", sub:"unidades procesadas", cls:"i", unit:""},
    {big:nfmt(safetyW), lbl:"EVENTOS SEGURIDAD", sub:"meta: 0", cls:safetyW>0?"r":"g", unit:""},
    {big:nfmt(qualityW), lbl:"EVENTOS CALIDAD", sub:"MRB · meta: 0", cls:qualityW>0?"a":"g", unit:""},
  ];

  return cards.map(c=>`
    <div class="sc ${c.cls}">
      <div class="sc-lbl">${c.lbl}</div>
      <div class="sc-big">${c.big}</div>
      <div class="sc-sub">${c.unit?c.unit+" · ":""}${c.sub}</div>
    </div>`).join("");
}

function buildChart(K){
  const outsA=K.daily_outs.actual, outsP=K.daily_outs.planned;
  const maxV = Math.max(1, ...outsA.map(v=>v||0), ...outsP.map(v=>v||0)) * 1.15; // headroom arriba

  // si no hay NINGUNA produccion real capturada, mostrar aviso en lugar del grafico vacio
  const hayReal = outsA.some(v=>v!==null && v!==undefined && v>0);
  if(!hayReal){
    const hayPlan = outsP.some(v=>v!==null && v!==undefined && v>0);
    return `<div class="chart2 empty">
      <div class="emptybox">
        <div class="emoji">📋</div>
        <div class="etit">Sin producción registrada para esta semana</div>
        <div class="esub">${hayPlan?"Ya hay plan cargado, faltan las salidas reales del Excel.":"Aún no hay datos de esta semana en el Excel."}</div>
      </div>
    </div>`;
  }

  let cols="";
  for(let i=0;i<7;i++){
    const a=outsA[i], p=outsP[i];
    let cls="z", mark="", hPct=1;
    if(a!==null && a!==undefined){
      // ratio real/plan. Regla de color:
      //   verde  = llego o paso la meta (>=99.5%)
      //   ambar  = del 50% al 99.5% (a partir de la mitad)
      //   rojo   = menos del 50% (menos de la mitad)
      const r=(p&&p>0)? a/p : 1;
      if(r>=0.995){ cls="g"; mark="✓"; }
      else if(r>=0.50){ cls="a"; mark="≈"; }
      else { cls="r"; mark="✕"; }
      hPct=Math.max(1.5,(a/maxV)*100);
    }
    const barVal = (a!==null && a>0)? Math.round(a).toLocaleString() : "";
    const metaPct = p&&p>0 ? (p/maxV)*100 : null;
    const metaHtml = metaPct!==null
      ? `<div class="mline" style="bottom:${metaPct}%"><span class="mlab">${Math.round(p).toLocaleString()}</span></div>`
      : "";
    // valor dentro si la barra es alta (>15% del alto), afuera si es chica
    const inside = hPct >= 15;
    const bvHtml = barVal ? `<span class="bv ${inside?'in':'out'}">${barVal}</span>` : "";
    cols += `<div class="col">
      <div class="plot">
        ${metaHtml}
        <div class="bar ${cls}" style="height:${hPct}%">${bvHtml}</div>
      </div>
      <div class="mark ${cls}">${mark}</div>
      <div class="day">Día ${i+1}</div>
    </div>`;
  }
  return `<div class="chart2"><div class="bars">${cols}</div></div>`;
}
function detailRows(K, di){
  const order=["safety","quality","daily_ins","daily_outs","yield","scrap","downtime"];
  let html="";
  for(const key of order){
    const k=K[key];
    const p=k.planned[di], a=k.actual[di], d=k.diff[di];
    let meter="";
    if(k.type==="units"||k.type==="count"){
      const r=(p&&p>0)?Math.min(a/p,1.3):(a?1:0);
      const cls=r>=1?"g":r>=0.9?"a":"r";
      meter=`<div class="mtrack"><div class="mfill ${cls}" style="width:${Math.min(r*100,100)}%"></div></div>`;
    } else if(k.type==="pct"){
      const cls=(a||0)>=(p||0)?"g":"r";
      meter=`<div class="mtrack"><div class="mfill ${cls}" style="width:${Math.min((a||0)*100,100)}%"></div></div>`;
    }
    const diffCls = d===null?"":d>=0?"diffpos":"diffneg";
    const diffStr = d===null?"—":(d>0?"+":"")+fmt(d,k.type==="pct"?"pct":k.type==="hours"?"hours":"units");
    html += `<tr class="kpiname"><td colspan="4">${k.label}<small>${{safety:"Seguridad",quality:"Calidad MRB",daily_ins:"Entradas",daily_outs:"Salidas FG",yield:"Rendimiento",scrap:"Desperdicio",downtime:"Cuello de botella"}[key]}</small></td></tr>
      <tr class="trk"><td class="t">Planned</td><td></td><td class="meter">${k.type!=="hours"?meter:""}</td><td class="num">${fmt(p,k.type)}</td></tr>
      <tr class="trk"><td class="t">Actual</td><td></td><td></td><td class="num">${fmt(a,k.type)}</td></tr>
      <tr class="trk"><td class="t">Diff</td><td></td><td></td><td class="num ${diffCls}">${diffStr}</td></tr>`;
  }
  return html;
}

// pick a sensible default day: the latest day that has actual outs, else day with any data
function defaultDay(wk){
  const a=wk.kpis.daily_outs.actual;
  for(let i=a.length-1;i>=0;i--) if(a[i]!==null && a[i]!==undefined && a[i]>0) return i;
  return 0;
}

// Ajusta el tablero para que SIEMPRE quepa en la pantalla sin scroll.
// Si el contenido se pasa de alto, lo encoge con un scale justo.
function fitToScreen(){
  const wrap = document.querySelector(".wrap");
  if(!wrap) return;
  // primero intentar en modo compacto (tv)
  document.body.classList.add("tv");
  wrap.style.height = "";
  const avail = window.innerHeight;
  const needed = wrap.scrollHeight;
  // si en modo compacto todo cabe -> sin scroll. Si no cabe -> scroll natural completo
  if(needed <= avail + 2){
    document.body.style.overflowY = "hidden";
    wrap.style.height = "100vh";
  } else {
    document.body.classList.remove("tv");
    document.body.style.overflowY = "auto";
    wrap.style.height = "auto";
  }
}

// re-ajustar cuando cambia el tamano de ventana o el zoom del navegador
let _fitTimer=null;
window.addEventListener("resize", ()=>{
  clearTimeout(_fitTimer);
  _fitTimer=setTimeout(fitToScreen, 120);
});

// busca la semana cuyas fechas contienen la fecha de hoy
function semanaDeHoy(){
  const hoy = new Date();
  const y=hoy.getFullYear(), m=String(hoy.getMonth()+1).padStart(2,"0"), dd=String(hoy.getDate()).padStart(2,"0");
  const hoyStr = `${y}-${m}-${dd}`;
  for(const key of DATA.week_order){
    const dates = DATA.weeks[key].dates.filter(Boolean);
    if(dates.length && dates[0] <= hoyStr && hoyStr <= dates[dates.length-1]){
      return key;
    }
  }
  return null; // si hoy no cae en ninguna, devuelve null (usa la primera)
}

(async function(){
  // Modo TV (1920x1080 sin scroll): auto si pantalla grande, o forzado con ?tv en la URL
  const forceTV = location.search.includes("tv");
  const bigScreen = window.innerWidth>=1280 && window.innerHeight>=700;
  if(forceTV || bigScreen) document.body.classList.add("tv");

  DATA = await loadData();

  // restaurar semana/dia desde la URL (para que no se pierda al recargar o actualizar)
  const params = new URLSearchParams(location.search);
  const savedWeek = params.get("w");
  const savedDay  = params.get("d");
  if(savedWeek && DATA.weeks[savedWeek]){
    CUR_WEEK = savedWeek;
    CUR_DAY = (savedDay!==null && !isNaN(savedDay)) ? parseInt(savedDay) : -1;
  } else {
    CUR_WEEK = semanaDeHoy() || DATA.week_order[0];
    CUR_DAY = -1; // por defecto: VISTA SEMANA COMPLETA
  }
  render();
  // refresco automatico: el data.json lo regenera Python cada hora.
  // aqui revisamos cada 5 min si cambio. Mantiene la semana/dia elegidos.
  setInterval(async ()=>{
    const fresh = await loadData();
    if(fresh.generated_at !== DATA.generated_at){
      DATA = fresh;
      if(!DATA.weeks[CUR_WEEK]) CUR_WEEK=DATA.week_order[0];
      render();
    }
  }, 5*60*1000);
})();
