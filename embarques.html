<style>
  :root{
    --navy:#0f2542; --navy2:#13325c; --green:#1f9d55; --amber:#e0a008; --red:#dc3545;

<body>
<div class="wrap" id="app"><div class="loading">Cargando hora a hora…</div></div>
<script>
const DIAS_ES={LUNES:"Lunes",MARTES:"Martes",MIERCOLES:"Miércoles",JUEVES:"Jueves",VIERNES:"Viernes",SABADO:"Sábado",DOMINGO:"Domingo"};
let DATA=null,CUR_WEEK=null,CUR_DIA=null,CUR_TURNO="A";

// ---- DIA DE PRODUCCION ----
// El turno C cruza la medianoche (10:00 pm -> 5:59 am), asi que entre las
// 00:00 y las 5:59 am seguimos dentro del dia ANTERIOR.
// Ej: el turno C que arranco el jueves 16 a las 10 pm sigue siendo "jueves 16"
// hasta las 5:59 am del 17. A las 6:00 am del 17 arranca el viernes 17, turno A.
function fechaProduccion(){
  const n = new Date();
  const min = n.getHours()*60 + n.getMinutes();
  if(min < 6*60){                 // antes de las 6:00 am -> aun es el dia de ayer
    n.setDate(n.getDate() - 1);
  }
  return n;
}

function hoyDia(){
  const m=["DOMINGO","LUNES","MARTES","MIERCOLES","JUEVES","VIERNES","SABADO"];
  return m[fechaProduccion().getDay()];
}

function turnoActivo(){
  // horarios reales de planta:
  //   Turno A: 6:00 am  -> 3:36 pm
  //   Turno B: 3:37 pm  -> 9:59 pm
  //   Turno C: 10:00 pm -> 5:59 am  (cruza medianoche)
  const n=new Date();
  const min = n.getHours()*60 + n.getMinutes();   // minutos desde medianoche
  const A_ini =  6*60;        // 06:00
  const A_fin = 15*60 + 36;   // 15:36
  const B_fin = 22*60;        // 22:00
  if(min >= A_ini && min <= A_fin) return "A";
  if(min >  A_fin && min <  B_fin) return "B";
  return "C";                  // 22:00 -> 05:59
}
function status(a,meta){ if(meta<=0) return a>0?"g":"z"; const r=a/meta; if(a===0)return"z"; return r>=0.995?"g":r>=0.50?"a":"r"; }

async function loadData(){
  try{const res=await fetch("data_hora.json?_="+Date.now(),{cache:"no-store"});if(!res.ok)throw 0;return await res.json();}
  catch(e){return SAMPLE_HORA;}
}

function render(){
  const wk=DATA.weeks[CUR_WEEK];
  if(!wk){document.getElementById("app").innerHTML="<div class='loading'>Sin datos</div>";return;}
  // la semana puede no tener dias cargados todavia
  const diasDisp = Object.keys(wk.dias||{});
  if(!diasDisp.length){
    document.getElementById("app").innerHTML="<div class='loading'>Sin datos para "+wk.label+"</div>";
    return;
  }
  if(!wk.dias[CUR_DIA]) CUR_DIA=diasDisp[0];
  const turno=wk.dias[CUR_DIA][CUR_TURNO]||wk.dias[CUR_DIA].A;
  if(!turno){
    document.getElementById("app").innerHTML="<div class='loading'>Sin datos para este turno</div>";
    return;
  }
  const horas=turno.hour_labels;
  const groups=turno.procesos.filter(p=>p.meta_hora>0).map(p=>[p.name,p]);
  const nH=horas.length;

  // construir grid: proceso + nH horas + TOTAL + DELTA + DOWNTIME + PROFICIENCY
  const cols=`210px repeat(${nH}, 1fr) 78px 76px 70px 76px`;
  const rows=`38px repeat(${groups.length}, 1fr)`;

  // encabezado
  let cells=`<div class="hm-cell hm-head" style="background:#0b1b30">PROCESO<br><small style="font-weight:600;opacity:.7">máquinas · meta/hora</small></div>`;
  horas.forEach(h=>cells+=`<div class="hm-cell hm-head">${h}</div>`);
  cells+=`<div class="hm-cell hm-head">TOTAL<br><small style="font-weight:600;opacity:.7">vs meta día</small></div>`;
  cells+=`<div class="hm-cell hm-head">DELTA</div>`;
  cells+=`<div class="hm-cell hm-head">DOWN<br><small style="font-weight:600;opacity:.7">min</small></div>`;
  cells+=`<div class="hm-cell hm-head">PROFIC.</div>`;

  groups.forEach(([name,g])=>{
    const maq = g.maquinas ? `<b>×${g.maquinas}</b> · ` : "";
    cells+=`<div class="hm-cell hm-proc">${name}<small>${maq}meta ${Math.round(g.meta_hora)}/h</small></div>`;
    g.hours.forEach(v=>{
      const cls=status(v,g.meta_hora);
      cells+=`<div class="hm-cell hm-val ${cls}">${v>0?Math.round(v):"·"}</div>`;
    });

    // TOTAL: viene del Excel; se compara contra meta del dia
    const tot = g.total ?? g.hours.reduce((a,b)=>a+b,0);
    const metaTot = g.meta_dia>0 ? g.meta_dia : g.meta_hora*nH;
    const clsT = status(tot, metaTot);
    const pctTot = metaTot>0 ? Math.round(tot/metaTot*100)+"%" : "";
    cells+=`<div class="hm-cell hm-total ${clsT}"><span>${tot>0?Math.round(tot).toLocaleString():"·"}</span><span class="sub">${pctTot}</span></div>`;

    // DELTA (tal como viene del Excel: meta - producido)
    //   negativo = se pasaron de la meta -> VERDE
    //   positivo = falta para la meta     -> ROJO
    const dl = Math.round(g.delta||0);
    const dlCls = dl<0 ? "g" : dl>0 ? "r" : "z";
    const dlTxt = dl.toLocaleString();
    cells+=`<div class="hm-cell hm-extra ${dlCls}">${dlTxt}</div>`;

    // DOWNTIME en minutos
    const dt = Math.round(g.downtime||0);
    cells+=`<div class="hm-cell hm-extra ${dt>0?"a":"z"}">${dt>0?dt:"·"}</div>`;

    // PROFICIENCY (fraccion del Excel: 1.25 = 125%)
    const pf = g.proficiency||0;
    const pfCls = pf<=0 ? "z" : pf>=0.995 ? "g" : pf>=0.50 ? "a" : "r";
    cells+=`<div class="hm-cell hm-extra ${pfCls}">${pf>0?Math.round(pf*100)+"%":"·"}</div>`;
  });

  document.getElementById("app").innerHTML=`
  <header class="top">
    <div><h1>HORA A HORA — ${DATA.plant.toUpperCase()}</h1>
    <div class="sub">PRODUCCIÓN POR HORA VS META · CADA ESTACIÓN</div></div>
    <div class="pills">
      <div class="pill"><div class="k">SEMANA</div><div class="v">${wk.label}</div></div>
      <div class="pill"><div class="k">DÍA</div><div class="v">${DIAS_ES[CUR_DIA]||CUR_DIA}</div></div>
      <div class="pill"><div class="k">TURNO</div><div class="v">Turno ${CUR_TURNO}</div></div>
    </div>
  </header>
  <div class="toolbar">
    <label>SEMANA</label>
    <select id="selWeek">${DATA.week_order.map(w=>`<option value="${w}" ${w===CUR_WEEK?"selected":""}>${w}</option>`).join("")}</select>
    <label>DÍA</label>
    <select id="selDia">${DATA.dias_orden.filter(d=>wk.dias[d]).map(d=>`<option value="${d}" ${d===CUR_DIA?"selected":""}>${DIAS_ES[d]}</option>`).join("")}</select>
    <label>TURNO</label>
    <select id="selTurno">${["A","B","C"].map(t=>`<option value="${t}" ${t===CUR_TURNO?"selected":""}>Turno ${t}</option>`).join("")}</select>
    <div class="src">Fuente: <b>${DATA.source_file}</b> · ${new Date(DATA.generated_at).toLocaleString("es-MX")}</div>
  </div>
  <div class="hm-wrap">
    <div class="hm-title">AVANCE POR HORA — ${wk.label} · ${DIAS_ES[CUR_DIA]} · Turno ${CUR_TURNO}
      <div class="leg"><span><i class="g"></i>Cumplió meta</span><span><i class="a"></i>A media (50%+)</span><span><i class="r"></i>Bajo (menos 50%)</span><span><i class="z"></i>Sin dato</span></div>
    </div>
    <div class="heatmap" style="grid-template-columns:${cols};grid-template-rows:${rows}">${cells}</div>
  </div>
  <footer class="foot"><h3>JUNTOS LOGRAMOS NUESTROS OBJETIVOS</h3></footer>`;

  document.getElementById("selWeek").onchange=e=>{CUR_WEEK=e.target.value;render();};
  document.getElementById("selDia").onchange=e=>{CUR_DIA=e.target.value;render();};
  document.getElementById("selTurno").onchange=e=>{CUR_TURNO=e.target.value;render();};
}

// numero de semana ISO del dia de PRODUCCION -> "WWxx"
// usa fechaProduccion() para que el turno C de madrugada no salte de semana
function semanaWWdeHoy(){
  const d=fechaProduccion();
  const target=new Date(d.valueOf());
  const dayNr=(d.getDay()+6)%7;
  target.setDate(target.getDate()-dayNr+3);
  const firstThursday=new Date(target.getFullYear(),0,4);
  const diff=target-firstThursday;
  const week=1+Math.round(diff/(7*24*3600*1000));
  const key="WW"+week;
  return DATA.weeks[key]?key:null;
}

(async function(){
  DATA=await loadData();
  // arrancar en la semana de hoy; si esa no tiene dias cargados, buscar la
  // primera que si los tenga (evita quedarse en una WW vacia)
  CUR_WEEK = semanaWWdeHoy();
  const tieneDias = k => k && DATA.weeks[k] && Object.keys(DATA.weeks[k].dias||{}).length;
  if(!tieneDias(CUR_WEEK)){
    CUR_WEEK = DATA.week_order.find(tieneDias) || DATA.week_order[0];
  }
  const dias = Object.keys(DATA.weeks[CUR_WEEK].dias||{});
  const hd = hoyDia();
  CUR_DIA = dias.includes(hd) ? hd : dias[0];
  CUR_TURNO = turnoActivo();
  render();
  setInterval(async()=>{const f=await loadData();if(f.generated_at!==DATA.generated_at){DATA=f;render();}},5*60*1000);
})();
